<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meyko · Abriendo ubicación</title>
<meta name="theme-color" content="#003f7d">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --meyko-blue:#003f7d;
    --meyko-blue-lt:#e8f0f9;
    --meyko-gold:#f5b82e;
    --muted:#6a7489;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{
    background:#fafbfd;
    min-height:100vh;
    font-family:'Montserrat',system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
    background-image:
      radial-gradient(circle at 0% 0%, rgba(0,63,125,.05) 0%, transparent 45%),
      radial-gradient(circle at 100% 100%, rgba(245,184,46,.07) 0%, transparent 45%);
  }

  .center{
    text-align:center;
    max-width:380px;
    animation:fadeIn .4s ease-out;
  }
  @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

  .logo{
    width:160px;
    height:auto;
    margin:0 auto 32px;
    display:block;
  }

  .spinner{
    width:42px; height:42px;
    border:3px solid var(--meyko-blue-lt);
    border-top-color:var(--meyko-blue);
    border-radius:50%;
    margin:0 auto 20px;
    animation:spin 0.9s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg)}}

  .title{
    font-weight:600;
    font-size:15px;
    color:var(--meyko-blue);
    margin-bottom:8px;
    letter-spacing:.01em;
  }
  .sub{
    font-weight:500;
    font-size:13px;
    color:var(--muted);
    line-height:1.5;
  }
  .sub a{
    color:var(--meyko-blue);
    font-weight:600;
    text-decoration:underline;
  }

  /* Acento dorado abajo */
  .accent{
    margin-top:28px;
    width:48px; height:3px;
    background:linear-gradient(90deg, var(--meyko-gold), #ffd97a);
    border-radius:2px;
    margin-left:auto;
    margin-right:auto;
  }
</style>
</head>
<body>

<div class="center">
  <img class="logo"
       src="https://meyko.com/web/image/website/2/logo/Meyko?unique=bdfdf4e"
       alt="Meyko"
       onerror="this.style.display='none'">

  <div class="spinner"></div>
  <div class="title" id="title">Abriendo ubicación...</div>
  <div class="sub" id="sub">
    Si no abre automáticamente,<br>
    <a href="#" id="fallback">tocá aquí</a>
  </div>

  <div class="accent"></div>
</div>

<script>
  // ═══════════════════════════════════════════════════════════
  // CONFIGURACIÓN - Pasá los datos por URL:
  // ?name=Mey-Ko+Bermejo&lat=15.5322675&lng=-88.0201474
  // ═══════════════════════════════════════════════════════════
  const POINT = {
    name: 'Sucursal Meyko',
    lat:  14.0957721,
    lng: -87.1941466
  };

  const params = new URLSearchParams(location.search);
  if (params.has('lat') && params.has('lng')) {
    POINT.name = params.get('name') || POINT.name;
    POINT.lat  = parseFloat(params.get('lat'));
    POINT.lng  = parseFloat(params.get('lng'));
  }

  // ── Detección ──
  const ua = navigator.userAgent;
  const isIOS     = /iPad|iPhone|iPod/.test(ua) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
  const isAndroid = /android/i.test(ua);

  const L = POINT.lat, G = POINT.lng, N = encodeURIComponent(POINT.name);

  let targetUrl;

  if (isAndroid) {
    // Android: geo: dispara el selector nativo del sistema
    // (Google Maps, Waze, etc - el usuario elige)
    targetUrl = `geo:${L},${G}?q=${L},${G}(${N})`;

  } else if (isIOS) {
    // iOS: maps:// abre Apple Maps; si tiene Google Maps/Waze instalado
    // y registrado, iOS puede preguntar con cuál abrir
    targetUrl = `maps://?q=${N}&ll=${L},${G}`;

  } else {
    // Desktop: Google Maps web
    targetUrl = `https://www.google.com/maps/search/?api=1&query=${L},${G}`;
  }

  // ── Fallback link visible ──
  const fallbackUrl = `https://www.google.com/maps/search/?api=1&query=${L},${G}`;
  document.getElementById('fallback').href = fallbackUrl;

  // ── Redirigir ──
  setTimeout(() => {
    location.href = targetUrl;
  }, 400);

  // ── Si después de 2.5s seguimos acá, mostrar fallback ──
  setTimeout(() => {
    document.getElementById('title').textContent = '¿No se abrió ninguna app?';
    document.getElementById('sub').innerHTML =
      '<a href="' + fallbackUrl + '">Abrir en Google Maps</a>';
  }, 2500);
</script>

</body>
</html>
