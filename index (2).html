<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meyko · Ir al punto</title>
<meta name="theme-color" content="#003f7d">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --meyko-blue:#003f7d;
    --meyko-blue-dk:#002a55;
    --meyko-blue-lt:#e8f0f9;
    --meyko-gold:#f5b82e;
    --meyko-gold-lt:#fff4d6;
    --ink:#1a2338;
    --muted:#6a7489;
    --bg:#fafbfd;
    --card:#ffffff;
    --line:#e4e8ef;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{
    background:var(--bg);color:var(--ink);
    font-family:'Inter',system-ui,sans-serif;
    min-height:100vh;-webkit-font-smoothing:antialiased;
    display:flex;align-items:center;justify-content:center;padding:20px;
  }
  body{
    background-image:
      radial-gradient(circle at 0% 0%, rgba(0,63,125,.06) 0%, transparent 40%),
      radial-gradient(circle at 100% 100%, rgba(245,184,46,.08) 0%, transparent 40%);
  }
  .card{
    width:100%;max-width:440px;background:var(--card);
    border-radius:20px;overflow:hidden;
    box-shadow:0 10px 40px rgba(0,63,125,.12);
    animation:slideUp .4s cubic-bezier(.2,.8,.2,1);
  }
  @keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

  .head{
    background:linear-gradient(135deg, var(--meyko-blue) 0%, var(--meyko-blue-dk) 100%);
    color:#fff;padding:22px 22px 28px;position:relative;overflow:hidden;
  }
  .head::before{
    content:'';position:absolute;top:-60px;right:-60px;
    width:200px;height:200px;
    background:radial-gradient(circle, rgba(245,184,46,.2) 0%, transparent 70%);
  }
  .head::after{
    content:'';position:absolute;bottom:0;left:0;right:0;height:4px;
    background:linear-gradient(90deg, var(--meyko-gold) 0%, #ffd97a 50%, var(--meyko-gold) 100%);
  }
  .brand{display:flex;align-items:center;gap:12px;position:relative;margin-bottom:18px}
  .brand-mark{
    width:42px;height:42px;background:#fff;border-radius:10px;
    display:flex;align-items:center;justify-content:center;flex-shrink:0;
    box-shadow:0 4px 12px rgba(0,0,0,.18);
  }
  .brand-mark svg{width:26px;height:26px}
  .brand-name{
    font-family:'Montserrat',sans-serif;font-weight:800;
    font-size:20px;letter-spacing:-0.01em;line-height:1;
  }
  .brand-name span{color:var(--meyko-gold)}
  .brand-tag{
    font-size:10px;font-weight:500;opacity:.75;
    letter-spacing:.12em;text-transform:uppercase;margin-top:4px;
  }
  .head h1{
    font-family:'Montserrat',sans-serif;font-weight:700;
    font-size:22px;letter-spacing:-0.015em;line-height:1.15;position:relative;
  }
  .head h1 em{font-style:normal;color:var(--meyko-gold)}

  .body{padding:22px}
  .point-card{
    background:var(--meyko-blue-lt);
    border-left:4px solid var(--meyko-gold);
    border-radius:10px;padding:14px 16px;margin-bottom:22px;
  }
  .point-name{
    font-family:'Montserrat',sans-serif;font-weight:700;
    font-size:16px;color:var(--meyko-blue);margin-bottom:4px;
  }
  .point-coords{
    font-family:'Inter',monospace;font-size:11.5px;
    color:var(--muted);letter-spacing:.02em;
  }
  .label{
    font-family:'Montserrat',sans-serif;font-size:10.5px;font-weight:700;
    letter-spacing:.14em;text-transform:uppercase;color:var(--muted);
    margin-bottom:10px;display:flex;align-items:center;gap:8px;
  }
  .label .device{
    background:var(--meyko-gold-lt);color:#b8850f;
    padding:2px 8px;border-radius:8px;font-size:9.5px;
  }
  .app-btn{
    display:flex;align-items:center;justify-content:space-between;
    width:100%;padding:13px 14px;background:var(--card);
    border:1.5px solid var(--line);border-radius:12px;
    font-family:'Montserrat',sans-serif;font-weight:600;font-size:14px;
    color:var(--ink);text-decoration:none;margin-bottom:8px;transition:all .15s;
  }
  .app-btn:last-child{margin-bottom:0}
  .app-btn:hover{
    border-color:var(--meyko-blue);background:var(--meyko-blue-lt);
    transform:translateX(3px);
  }
  .app-btn:active{transform:translateX(0) scale(.98)}
  .app-btn-left{display:flex;align-items:center;gap:12px}
  .app-btn .ico{
    width:34px;height:34px;border-radius:8px;
    display:flex;align-items:center;justify-content:center;flex-shrink:0;
  }
  .app-btn .ico svg{width:18px;height:18px}
  .app-btn .arrow{
    color:var(--muted);font-size:18px;transition:transform .15s, color .15s;
  }
  .app-btn:hover .arrow{color:var(--meyko-blue);transform:translateX(3px)}
  .ico-google{background:#e8f0fe;color:#1a73e8}
  .ico-waze{background:#e6f9ff;color:#05c8f7}
  .ico-apple{background:#f2f2f7;color:#1a2338}
  .ico-geo{background:var(--meyko-gold-lt);color:#b8850f}

  .redirect{text-align:center;padding:24px 0 8px}
  .spinner{
    width:36px;height:36px;
    border:3px solid var(--meyko-blue-lt);border-top-color:var(--meyko-blue);
    border-radius:50%;margin:0 auto 16px;animation:spin 0.9s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg)}}
  .redirect-text{
    font-family:'Montserrat',sans-serif;font-weight:600;
    font-size:14px;color:var(--meyko-blue);margin-bottom:6px;
  }
  .redirect-sub{font-size:12.5px;color:var(--muted)}
  .redirect-sub a{color:var(--meyko-blue);font-weight:600;text-decoration:underline}

  .foot{
    text-align:center;padding:14px 22px 18px;border-top:1px solid var(--line);
    font-size:10.5px;font-weight:500;letter-spacing:.1em;
    text-transform:uppercase;color:var(--muted);
  }
  .foot span{color:var(--meyko-gold)}
</style>
</head>
<body>

<div class="card">

  <div class="head">
    <div class="brand">
      <div class="brand-mark">
        <svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
          <path d="M4 34 L4 6 L12 6 L20 22 L28 6 L36 6 L36 34 L30 34 L30 17 L22 32 L18 32 L10 17 L10 34 Z" fill="#003f7d"/>
          <circle cx="20" cy="13" r="2.5" fill="#f5b82e"/>
        </svg>
      </div>
      <div>
        <div class="brand-name">MEY<span>·</span>KO</div>
        <div class="brand-tag">Juntos por tu bienestar</div>
      </div>
    </div>
    <h1>Te llevamos a la <em>sucursal</em></h1>
  </div>

  <div class="body">
    <div class="point-card">
      <div class="point-name" id="pt-name">—</div>
      <div class="point-coords" id="pt-coords">—</div>
    </div>
    <div id="content"></div>
  </div>

  <div class="foot">Meyko <span>·</span> Honduras</div>
</div>

<script>
  // ═══════════════════════════════════════════════════════════
  // CONFIGURACIÓN - Editá estos valores o pasalos por URL
  // URL: ?name=Sucursal&lat=14.0957&lng=-87.1941
  // ═══════════════════════════════════════════════════════════
  const POINT = {
    name: 'Sucursal Meyko',
    lat:  14.0957721,
    lng: -87.1941466
  };

  const params = new URLSearchParams(location.search);
  if (params.has('lat') && params.has('lng')) {
    POINT.name = params.get('name') || POINT.name;
    POINT.lat  = parseFloat(params.get('lat'));
    POINT.lng  = parseFloat(params.get('lng'));
  }

  // ── Detección de dispositivo ──
  const ua = navigator.userAgent;
  const isIOS     = /iPad|iPhone|iPod/.test(ua) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
  const isAndroid = /android/i.test(ua);
  const isMobile  = isIOS || isAndroid;

  // ── URLs por app ──
  const L = POINT.lat, G = POINT.lng, N = encodeURIComponent(POINT.name);
  const urls = {
    googleWeb: `https://www.google.com/maps/dir/?api=1&destination=${L},${G}`,
    waze:      `https://waze.com/ul?ll=${L},${G}&navigate=yes`,
    apple:     `http://maps.apple.com/?daddr=${L},${G}&dirflg=d`,
    geo:       `geo:${L},${G}?q=${L},${G}(${N})`
  };

  // ── Iconos SVG ──
  const ICONS = {
    google: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C7.58 2 4 5.58 4 10c0 5.25 7 12 8 12s8-6.75 8-12c0-4.42-3.58-8-8-8zm0 11a3 3 0 110-6 3 3 0 010 6z"/></svg>',
    waze:   '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.54 11.06A9 9 0 0 0 3.46 11.06c.76 2 1.41 3 2.54 4a7 7 0 0 1 1 2l.5 2h1m7-2h1l.5-2a7 7 0 0 1 1-2c1.13-1 1.78-2 2.54-4"/><circle cx="8.5" cy="10.5" r=".5" fill="currentColor"/><circle cx="15.5" cy="10.5" r=".5" fill="currentColor"/><path d="M9 15s1 1 3 1 3-1 3-1"/></svg>',
    apple:  '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a10 10 0 100 20 10 10 0 000-20zm4.5 6.5l-2.5 7-7 2.5 2.5-7 7-2.5z"/></svg>',
    geo:    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v10M7 12h10"/></svg>'
  };

  // ── Render ──
  document.getElementById('pt-name').textContent   = POINT.name;
  document.getElementById('pt-coords').textContent = `${L.toFixed(5)}, ${G.toFixed(5)}`;

  const content = document.getElementById('content');

  if (!isMobile) {
    content.innerHTML = `
      <div class="redirect">
        <div class="spinner"></div>
        <div class="redirect-text">Abriendo Google Maps...</div>
        <div class="redirect-sub">
          Si no abre automáticamente<br>
          <a href="${urls.googleWeb}">hacé clic aquí</a>
        </div>
      </div>
    `;
    setTimeout(() => { location.href = urls.googleWeb; }, 500);
  } else {
    const deviceLabel = isIOS ? 'iOS' : 'Android';
    const apps = isIOS
      ? [
          { key: 'apple',  url: urls.apple,     label: 'Apple Maps' },
          { key: 'google', url: urls.googleWeb, label: 'Google Maps' },
          { key: 'waze',   url: urls.waze,      label: 'Waze' }
        ]
      : [
          { key: 'google', url: urls.googleWeb, label: 'Google Maps' },
          { key: 'waze',   url: urls.waze,      label: 'Waze' },
          { key: 'geo',    url: urls.geo,       label: 'Elegir app del sistema' }
        ];

    content.innerHTML = `
      <div class="label">
        <span>Elegí tu app</span>
        <span class="device">${deviceLabel}</span>
      </div>
      ${apps.map(a => `
        <a class="app-btn" href="${a.url}">
          <span class="app-btn-left">
            <span class="ico ico-${a.key}">${ICONS[a.key]}</span>
            <span>${a.label}</span>
          </span>
          <span class="arrow">→</span>
        </a>
      `).join('')}
    `;
  }
</script>

</body>
</html>
